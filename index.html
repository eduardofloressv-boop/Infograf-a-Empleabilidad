<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guía sobre Empleo e Imagen Personal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
        }
        h1 {
            color: #1a2a3a;
            font-size: 26px;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 15px 0;
            text-decoration: none;
            color: white;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            box-sizing: border-box; /* Asegura que el padding no desborde el botón */
            transition: all 0.3s ease;
        }
        /* Botón 1: Azul Profesional */
        .btn-entrevista {
            background-color: #2c3e50;
            border: 2px solid #2c3e50;
        }
        .btn-entrevista:hover {
            background-color: #34495e;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(44, 62, 80, 0.3);
        }
        /* Botón 2: Azul Vibrante */
        .btn-guia {
            background-color: #007bff;
            border: 2px solid #007bff;
        }
        .btn-guia:hover {
            background-color: #0056b3;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.3);
        }
        .footer-brand {
            margin-top: 25px;
            font-size: 14px;
            color: #999;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Guía sobre Empleo e Imagen Personal</h1>
        <p>Selecciona una de las herramientas para comenzar:</p>
        
        <a href="https://eduardofloressv-boop.github.io/Entrevista-de-trabajo/" class="btn btn-entrevista">Acceder a Entrevista de Trabajo</a>
        
        <a href="https://eduardofloressv-boop.github.io/Infografia-Empleabilidad/" class="btn btn-guia">Guía de Empleabilidad</a>

        <div class="footer-brand">PsicoRefugioSV</div>
    </div>

</body>
</html>
